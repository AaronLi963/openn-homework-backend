spring:
  application:
    name: demo

# define mysql properties here
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

# define redis properties here
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

# define rocketmq properties here
  rocketmq:
    namesrv-addr: ${ROCKETMQ_NAMESRV_ADDR}
